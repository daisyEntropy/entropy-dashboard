<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>브랜드지놈 마케팅 대시보드 (Supabase)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f6fa;
    --panel: #ffffff;
    --border: #e7e8ee;
    --text: #1c1d26;
    --text-dim: #6f7d76;
    --sage-light: #D1E5DA;
    --sage-mid: #8FBBA3;
    --accent: #3E6650;
    --accent-dim: #D1E5DA;
    --sidebar-bg: #16241d;
    --sidebar-bg2: #1d3327;
    --sidebar-text: #b7cdc0;
    --sidebar-head: #6f8879;
    --sidebar-active: #3E6650;
    --brand-entropy: #2f9e6e;
    --brand-entropy-bg: #e4f6ee;
    --brand-morandi: #7c5cbf;
    --brand-morandi-bg: #efe8fb;
    --status-cold-bg: #eceef1; --status-cold-fg: #5b5e66;
    --status-response-bg: #fff6d9; --status-response-fg: #8a6d00;
    --status-meeting-bg: #dfeeff; --status-meeting-fg: #1a5aa8;
    --status-nego-bg: #ffe9d6; --status-nego-fg: #a35a12;
    --status-confirmed-bg: #dff5e3; --status-confirmed-fg: #1e8f4e;
      --status-dropped-bg: #fbe1e4; --status-dropped-fg: #b23a4a; --status-gifted-bg: #ece1fb; --status-gifted-fg: #6b3fa0;  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
    font-size: 13.5px; height: 100%; }
  #app { display:none; height:100vh; overflow:hidden; }

  #auth-loading, #login-overlay { position:fixed; inset:0; background:var(--bg); z-index:5000;
    display:flex; align-items:center; justify-content:center; }
  #login-overlay { display:none; }
  .login-box { background:#fff; border:1px solid var(--border); border-radius:16px; padding:40px 36px;
    text-align:center; width:360px; max-width:90vw; box-shadow:0 10px 40px rgba(0,0,0,.08); }
  .login-box .login-logo { font-size:34px; margin-bottom:10px; }
  .login-box h2 { font-size:16px; margin:0 0 8px; }
  .login-box p { font-size:12.5px; color:var(--text-dim); margin:0 0 22px; line-height:1.6; }
  .google-btn { display:inline-flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--border);
    border-radius:10px; padding:11px 22px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text); }
  .google-btn:hover { background:#f7f7f9; border-color:#ccc; }
  .google-btn svg { width:18px; height:18px; }
  .login-error { margin-top:14px; background:var(--status-dropped-bg); color:var(--status-dropped-fg);
    border-radius:8px; padding:9px 12px; font-size:11.5px; line-height:1.5; }
  .auth-spinner { font-size:12.5px; color:var(--text-dim); }

  #sidebar { width: 236px; flex-shrink:0; background: linear-gradient(180deg,var(--sidebar-bg),var(--sidebar-bg2));
    color: var(--sidebar-text); display:flex; flex-direction:column; padding: 16px 12px; overflow-y:auto; }
  #sidebar .brand { font-weight:700; color:#fff; font-size:14.5px; padding: 4px 8px 14px; line-height:1.4; }
  #sidebar .brand small { display:block; font-weight:400; color:#8083b0; font-size:11px; margin-top:3px; }
  .user-chip { display:flex; align-items:center; gap:9px; background:rgba(255,255,255,0.06); border-radius:12px;
    padding:9px 10px; margin-bottom:16px; }
  .user-chip .avatar { width:30px; height:30px; border-radius:50%; background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
  .user-chip .who { min-width:0; flex:1; }
  .user-chip .name { color:#fff; font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-chip .mail { font-size:10.5px; color:#8083b0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nav-group { margin-bottom:14px; }
  .nav-group .glabel { font-size:10px; letter-spacing:.06em; color: var(--sidebar-head); font-weight:700;
    text-transform:uppercase; padding:4px 10px 6px; }
  .nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; border-radius:10px; cursor:pointer;
    color: var(--sidebar-text); font-size:13px; font-weight:500; margin-bottom:2px; transition: background .12s; user-select:none; }
  .nav-item:hover { background: rgba(255,255,255,0.06); }
  .nav-item.active { background: var(--sidebar-active); color:#fff; }
  .nav-item .ic { font-size:14.5px; width:18px; text-align:center; }
  #sidebar .foot { margin-top:auto; padding:10px 8px 2px; font-size:10px; color:#5f6084; line-height:1.6; }

  #main { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
  #topbar { padding: 16px 26px 12px; border-bottom:1px solid var(--border); background: var(--panel); flex-shrink:0;
    display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
  #topbar h1 { font-size:18px; margin:0 0 2px; }
  #topbar .sub { color:var(--text-dim); font-size:12px; }
  #status-line { display:flex; align-items:center; gap:8px; margin-top:8px; font-size:11.5px; color:var(--text-dim); }
  .dot { width:6px; height:6px; border-radius:50%; background:#ccc; }
  .dot.ok { background:#33c46a; }
  .dot.err { background:#e5484d; }
  .pill-btn { background:var(--accent); color:#fff; border:none; border-radius:99px; padding:9px 16px; font-size:12.5px;
    font-weight:600; cursor:pointer; text-decoration:none; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
  .pill-btn:hover { background:#2f4f3e; }
  .pill-btn.ghost { background:#fff; color:var(--accent); border:1px solid var(--accent); }
  .pill-btn.ghost:hover { background:var(--sage-light); }
  .topbar-actions { display:flex; gap:8px; flex-shrink:0; }

  #filterbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding: 10px 26px; background: var(--panel);
    border-bottom:1px solid var(--border); flex-shrink:0; }
  #filterbar label { font-size:11.5px; color: var(--text-dim); margin-right:2px; }
  #filterbar select, #filterbar input[type=text] { border:1px solid var(--border); border-radius:8px; padding:6px 10px;
    font-size:12.5px; background:#fff; color:var(--text); outline:none; }
  #filterbar select:focus, #filterbar input:focus { border-color: var(--accent); }
  #filterbar .chip-count { margin-left:auto; font-size:11.5px; color:var(--text-dim); }
  #filterbar .reset-btn { border:1px solid var(--border); background:#fff; border-radius:8px; padding:6px 12px;
    font-size:12px; cursor:pointer; color:var(--text-dim); }
  #filterbar .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  #content { flex:1; overflow:auto; padding: 20px 26px 44px; }

  .kpi-row { display:grid; grid-template-columns: repeat(5, 1fr); gap:14px; margin-bottom:18px; }
  @media (max-width: 1150px) { .kpi-row { grid-template-columns: repeat(3,1fr); } }
  .kpi-card { border-radius:14px; padding:16px 18px; border:1px solid var(--border); background:var(--panel); }
  .kpi-card.hero { background: linear-gradient(135deg,var(--sage-mid),var(--accent)); border:none; color:#fff; }
  .kpi-card .klabel { font-size:11.5px; opacity:.85; margin-bottom:8px; }
  .kpi-card.hero .klabel { color:#eaf5ef; }
  .kpi-card:not(.hero) .klabel { color: var(--text-dim); }
  .kpi-card .kval { font-size:24px; font-weight:800; line-height:1.1; }
  .kpi-card .ksub { font-size:11px; margin-top:6px; color: var(--text-dim); }
  .kpi-card.hero .ksub { color:#eaf5ef; }
  .kval.green { color:#1e8f4e; } .kval.red { color:#c0394a; } .kval.purple { color:#a3791f; }
  .progress-track { height:6px; border-radius:99px; background:#eee; margin-top:9px; overflow:hidden; }
  .progress-fill { height:100%; background: var(--accent); border-radius:99px; }

  .grid2 { display:grid; grid-template-columns: 1.5fr 1fr; gap:14px; margin-bottom:18px; }
  @media (max-width: 980px) { .grid2 { grid-template-columns:1fr; } }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
  .panel .phead { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .panel .phead h3 { font-size:13.5px; margin:0; }
  .panel .phead .lnk { font-size:11.5px; color:var(--accent); cursor:pointer; text-decoration:none; }
  .chart-box { height:230px; position:relative; }
  .donut-wrap { display:flex; align-items:center; gap:16px; }
  .donut-wrap .chart-box { width:150px; height:150px; flex-shrink:0; }
  .legend-list { flex:1; display:flex; flex-direction:column; gap:8px; }
  .legend-row { display:flex; align-items:center; gap:8px; font-size:12px; }
  .legend-row .sw { width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .legend-row .lname { flex:1; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .legend-row .lval { font-weight:700; color:var(--text-dim); font-size:11.5px; }

  .rank-row { display:flex; align-items:center; gap:10px; padding:7px 0; }
  .rank-row .rname { width:110px; flex-shrink:0; font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rank-row .rbar-track { flex:1; height:9px; border-radius:99px; background:#eef0f6; overflow:hidden; }
  .rank-row .rbar-fill { height:100%; border-radius:99px; background: var(--accent); }
  .rank-row .rval { width:64px; text-align:right; font-size:12px; font-weight:700; color:var(--text-dim); flex-shrink:0; }

  .runner-picker { display:flex; align-items:center; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
  .runner-select { border:2px solid var(--accent); border-radius:12px; padding:12px 16px; font-size:14px; font-weight:700;
    background:#fff; color:var(--text); outline:none; min-width:260px; }
  .runner-hint { color:var(--text-dim); font-size:12px; }
  .stage-track { display:flex; align-items:center; margin: 6px 0 4px; }
  .stage-step { flex:1; text-align:center; position:relative; }
  .stage-step .sdot { width:22px; height:22px; border-radius:50%; background:#e7e8ee; color:#9a9caa; font-size:11px;
    display:flex; align-items:center; justify-content:center; margin:0 auto 6px; font-weight:700; position:relative; z-index:2; }
  .stage-step .slabel { font-size:11px; color:var(--text-dim); font-weight:600; }
  .stage-step .sline { position:absolute; top:11px; left:-50%; width:100%; height:3px; background:#e7e8ee; z-index:1; }
  .stage-step:first-child .sline { display:none; }
  .stage-step.done .sdot { background: var(--accent); color:#fff; }
  .stage-step.done .sline { background: var(--accent); }
  .stage-step.done .slabel { color: var(--text); }
  .stage-step.current .sdot { background: var(--accent); color:#fff; box-shadow:0 0 0 4px var(--accent-dim); }
  .stage-step.current .slabel { color: var(--accent); font-weight:800; }
  .stage-step.dropped .sdot { background: var(--status-dropped-fg); color:#fff; }
  .note-list { display:flex; flex-direction:column; gap:10px; }
  .note-item { display:flex; gap:10px; padding:11px 13px; background:#faf9fc; border-radius:10px; border:1px solid var(--border); }
  .note-item .nic { font-size:14px; flex-shrink:0; }
  .note-item .ntitle { font-size:11px; color:var(--text-dim); font-weight:700; margin-bottom:3px; }
  .note-item .nbody { font-size:12.5px; line-height:1.5; }
  .note-item .nbody a { color: var(--accent); text-decoration:none; }

  table.data { border-collapse:collapse; width:100%; background:var(--panel); border-radius:10px; overflow:hidden;
    box-shadow: 0 0 0 1px var(--border); }
  table.data thead th { position:sticky; top:0; background:#faf9fc; text-align:left; padding:9px 10px; font-size:11.5px;
    color:var(--text-dim); border-bottom:1px solid var(--border); white-space:nowrap; z-index:1; }
  table.data tbody td { padding:9px 10px; border-bottom:1px solid #f0f0f2; font-size:12.5px; vertical-align:top; }
  table.data tbody tr:hover { background:#faf9ff; }
  table.data tbody tr:last-child td { border-bottom:none; }
  .cell-name { font-weight:600; }
  .cell-note { color:var(--text-dim); max-width:320px; }
  .cell-note a { color: var(--accent); text-decoration:none; }
  .cell-note a:hover { text-decoration:underline; }
  .muted { color:#bbb; }
  .row-actions { display:flex; gap:6px; white-space:nowrap; }

  .badge { display:inline-block; padding:2px 9px; border-radius:99px; font-size:11px; font-weight:600; white-space:nowrap; }
  .badge-entropy { background: var(--brand-entropy-bg); color: var(--brand-entropy); }
  .badge-morandi { background: var(--brand-morandi-bg); color: var(--brand-morandi); }
  .badge-plain { background:#eee; color:#666; }
  .st { display:inline-block; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:700; white-space:nowrap; }
  .st-cold { background:var(--status-cold-bg); color:var(--status-cold-fg); }
  .st-response { background:var(--status-response-bg); color:var(--status-response-fg); }
  .st-meeting { background:var(--status-meeting-bg); color:var(--status-meeting-fg); }
  .st-nego { background:var(--status-nego-bg); color:var(--status-nego-fg); }
  .st-confirmed { background:var(--status-confirmed-bg); color:var(--status-confirmed-fg); }
      .st-dropped { background:var(--status-dropped-bg); color:var(--status-dropped-fg); }
        .st-gifted { background:var(--status-gifted-bg); color:var(--status-gifted-fg); }
  section.block { margin-bottom:22px; }
  section.block h2 { font-size:14px; margin:0 0 10px; display:flex; align-items:center; gap:10px; }

  /* Month-grid calendar */
  .cal-toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
  .cal-nav { display:flex; align-items:center; gap:8px; }
  .cal-nav-btn { width:28px; height:28px; border-radius:8px; border:1px solid var(--border); background:#fff;
    cursor:pointer; font-size:14px; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .cal-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
  .cal-month-label { font-weight:700; font-size:15px; min-width:104px; text-align:center; }
  .cal-today-btn { border:1px solid var(--border); background:#fff; border-radius:8px; padding:6px 12px;
    font-size:12px; cursor:pointer; color:var(--text-dim); }
  .cal-today-btn:hover { border-color:var(--accent); color:var(--accent); }
  .cal-legend { font-size:11.5px; color:var(--text-dim); display:flex; align-items:center; gap:6px; }
  .cal-legend-dot { width:9px; height:9px; border-radius:3px; background:var(--accent); display:inline-block; }
  .cal-grid-wrap { background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .cal-dow { display:grid; grid-template-columns: repeat(7,1fr); background:#faf9fc; border-bottom:1px solid var(--border); }
  .cal-dow div { padding:8px 0; text-align:center; font-size:11px; font-weight:700; color:var(--text-dim); }
  .cal-dow div:first-child { color:#c0504d; }
  .cal-dow div:last-child { color:#3a6fb0; }
  .cal-weeks { display:flex; flex-direction:column; }
  .cal-week { position:relative; border-bottom:1px solid #f0f1f4; }
  .cal-week:last-child { border-bottom:none; }
  .cal-week-days { display:grid; grid-template-columns:repeat(7,1fr); }
  .cal-daycell { border-right:1px solid #f0f1f4; padding:4px 5px; box-sizing:border-box; }
  .cal-daycell:last-child { border-right:none; }
  .cal-daycell.other-month { background:#fbfbfc; }
  .cal-daynum { font-size:11px; font-weight:600; color:var(--text); display:inline-flex; align-items:center;
    justify-content:center; width:20px; height:20px; border-radius:50%; }
  .cal-daycell.other-month .cal-daynum { color:#c9cbd3; }
  .cal-daynum.is-today { background:var(--accent); color:#fff; }
  .cal-week-bars { position:absolute; left:0; right:0; top:24px; pointer-events:none; }
  .cal-bar { position:absolute; height:19px; line-height:19px; font-size:10.5px; color:#fff; background:var(--accent);
    padding:0 7px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; pointer-events:auto;
    box-sizing:border-box; }
  .cal-bar.round-l { border-top-left-radius:5px; border-bottom-left-radius:5px; margin-left:2px; }
  .cal-bar.round-r { border-top-right-radius:5px; border-bottom-right-radius:5px; margin-right:2px; }
  .cal-bar:hover { background:#2f4f3e; }
  .cal-popover-backdrop { position:fixed; inset:0; z-index:999; background:transparent; }
  .cal-popover { position:fixed; z-index:1000; width:300px; max-width:90vw; background:var(--panel);
    border-radius:12px; box-shadow:0 10px 34px rgba(0,0,0,.22); padding:16px 18px; }
  .cal-popover .cal-popover-close { position:absolute; top:8px; right:10px; cursor:pointer; color:var(--text-dim);
    font-size:13px; background:none; border:none; width:24px; height:24px; border-radius:50%; }
  .cal-popover .cal-popover-close:hover { background:var(--bg); }
  .cal-popover h3 { margin:0 0 8px; font-size:14px; padding-right:20px; line-height:1.4; }
  .cal-popover .cal-detail-range { font-size:11.5px; color:var(--text-dim); margin-bottom:10px; }
  .cal-popover .cal-detail-desc { font-size:12.5px; line-height:1.6; white-space:pre-wrap; color:var(--text);
    max-height:180px; overflow:auto; }
  .cal-popover .cal-detail-actions { display:flex; gap:8px; margin-top:12px; }
  .cal-note { font-size:11px; color:var(--text-dim); margin-top:8px; }

  .content-meta { font-size:11.5px; color:var(--text-dim); margin-top:4px; }
  .content-meta b { color:var(--text); font-weight:600; }
  .content-empty-kpi { font-size:12px; color:var(--text-dim); padding:14px; background:var(--panel);
    border:1px dashed var(--border); border-radius:10px; margin-bottom:16px; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); }
  .chart-wrap { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; height:280px; }

  table.kpi { border-collapse:collapse; width:100%; background:var(--panel); border-radius:10px; overflow:hidden;
    box-shadow:0 0 0 1px var(--border); margin-bottom:20px; }
  table.kpi th { background:#faf9fc; text-align:left; padding:9px 12px; font-size:11.5px; color:var(--text-dim); border-bottom:1px solid var(--border); }
  table.kpi td { padding:9px 12px; border-bottom:1px solid #f0f0f2; font-size:12.5px; }
  table.kpi tr:last-child td { border-bottom:none; }
  table.kpi tr.total td { font-weight:700; background:#faf9fc; }

  /* Modal / forms */
  .modal-backdrop { position:fixed; inset:0; background:rgba(20,26,22,.45); z-index:3000; display:flex;
    align-items:center; justify-content:center; padding:20px; }
  .modal-box { background:#fff; border-radius:16px; padding:22px 24px 20px; width:520px; max-width:100%;
    max-height:88vh; overflow:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .modal-box h3 { margin:0 0 16px; font-size:15.5px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 14px; }
  .form-row { margin-bottom:0; display:flex; flex-direction:column; gap:5px; }
  .form-row.full { grid-column:1 / -1; }
  .form-row label { font-size:11.5px; color:var(--text-dim); font-weight:600; }
  .form-row input, .form-row select, .form-row textarea {
    border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:12.5px;
    font-family:inherit; outline:none; background:#fff; color:var(--text); width:100%; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--accent); }
  .form-row textarea { resize:vertical; min-height:58px; }
  .modal-actions { display:flex; justify-content:space-between; align-items:center; margin-top:18px; }
  .btn { border:none; border-radius:8px; padding:9px 16px; font-size:12.5px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#2f4f3e; }
  .btn-secondary { background:#eee; color:var(--text); }
  .btn-secondary:hover { background:#e2e2e2; }
  .btn-danger { background:var(--status-dropped-bg); color:var(--status-dropped-fg); }
  .btn-danger:hover { background:#f6cfd3; }
  .btn-sm { padding:5px 10px; font-size:11px; border-radius:6px; }
  .modal-err { background:var(--status-dropped-bg); color:var(--status-dropped-fg); border-radius:8px;
    padding:8px 12px; font-size:11.5px; margin-bottom:12px; display:none; }

  /* Toast */

ile" name="image_file" accept="image/*"></div>` + (row.image_url ? `<div class="form-row full"><label>현재 이미지</label>${kakaoImageHtml(row.image_url)}</div>` : ''); } function openKakaoForm(row){ const isEdit = !!row; openModal(isEdit?'집행 내역 상세/수정':'신규 집행 내역 등록', kakaoFormFields(row), async (data) => { let imageUrl = row ? row.image_url : null; if (data.image_file && data.image_file.size > 0){ imageUrl = await sbUploadKakaoImage(data.image_file, data.detail_code||data.title); } const payload = { title:data.title, publish_date:data.publish_date||null, manager:data.manager||null, detail_code:data.detail_code||null, cost:data.cost!==''?Number(data.cost):null, msg_sent:data.msg_sent!==''?Number(data.msg_sent):null, msg_open:data.msg_open!==''?Number(data.msg_open):null, msg_click:data.msg_click!==''?Number(data.msg_click):null, open_rate:data.open_rate!==''?Number(data.open_rate):null, click_rate:data.click_rate!==''?Number(data.click_rate):null, image_url:imageUrl }; if (isEdit) await sbUpdate('kakao_campaigns', row.id, payload); else await sbInsert('kakao_campaigns', [payload]); toast(isEdit?'집행 내역을 수정했어요.':'신규 집행 내역을 등록했어요.', 'ok'); await loadAll(); }, isEdit ? { onDelete: async () => { await sbDelete('kakao_campaigns', row.id); toast('삭제했어요.'); await loadAll(); } } : null); } function renderKakaoChart(rows){ destroyChart('kakaoRate'); const kctx = document.getElementById('chart-kakao-rate'); if (!kctx || !window.Chart) return; const sorted = [...rows].filter(r=>r.publish_date).sort((a,b)=> (a.publish_date||'').localeCompare(b.publish_date||'')); const labels = sorted.length?sorted.map(r=> fmtMD(new Date(r.publish_date))):['데이터 없음']; charts.kakaoRate = new Chart(kctx, { type:'line', data:{ labels: labels, datasets:[ { label:'열람율(%)', data: sorted.map(r=> r.open_rate!=null?Number(r.open_rate):null), borderColor:'#3E6650', backgroundColor:'rgba(62,102,80,0.14)', fill:false, tension:.35, pointRadius:2, spanGaps:true }, { label:'클릭율(%)', data: sorted.map(r=> r.click_rate!= function toast(msg, type){

function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function linkify(text){
  if (!text) return '';

}

function closeModal(){ const b = document.getElementById('modal-backdrop'); if (b) b.remove(); }
function openModal(title, bodyHtml, onSubmit, opts){
  closeModal();
  const backdrop = document.createElement('div');
  backdrop.id = 'modal-backdrop';
  backdrop.className = 'modal-backdrop';
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  const box = document.createElement('div');
  box.className = 'modal-box';
  box.innerHTML = `
    <h3>${title}</h3>
    <div class="modal-err" id="modal-err"></div>
    <form id="modal-form">
      <div class="form-grid">${bodyHtml}</div>
      <div class="modal-actions">
        <div>${opts && opts.onDelete ? `<button type="button" class="btn btn-danger btn-sm" id="modal-delete">삭제</button>` : ''}</div>
        <div style="display:flex;gap:8px;">
          <button type="button" class="btn btn-secondary" id="modal-cancel">취소</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">저장</button>
        </div>
      </div>
    </form>
  `;
  backdrop.appendChild(box);
  document.body.appendChild(backdrop);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  if (opts && opts.onDelete){
    document.getElementById('modal-delete').addEventListener('click', async () => {
      if (!confirm('정말 삭제할까요? 되돌릴 수 없어요.')) return;
      try { await opts.onDelete(); closeModal(); } catch(err){ showModalErr(err.message); }
    });
  }
  document.getElementById('modal-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd.entries());
    const btn = document.getElementById('modal-submit');
    btn.disabled = true; btn.textContent = '저장 중…';
    try {
      await onSubmit(data);
      closeModal();
    } catch(err){
      showModalErr(err.message);
      btn.disabled = false; btn.textContent = '저장';
    }
  });
}
function showModalErr(msg){
  const el = document.getElementById('modal-err');
  if (!el) return;
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function field(name, label, opts){
  opts = opts || {};
  const full = opts.full ? ' full' : '';
  const val = opts.value != null ? esc(opts.value) : '';
  let input;
  if (opts.type === 'select'){
    input = `<select name="${name}" ${opts.required?'required':''}>${opts.options.map(o=>`<option value="${esc(o)}" ${o===opts.value?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  } else if (opts.type === 'textarea'){
    input = `<textarea name="${name}" ${opts.required?'required':''}>${val}</textarea>`;
  } else {
    input = `<input type="${opts.type||'text'}" name="${name}" value="${val}" ${opts.required?'required':''} ${opts.step?`step="${opts.step}"`:''}>`;
  }
  return `<div class="form-row${full}"><label>${label}</label>${input}</div>`;
}

function applyFilters(rows){
  return rows.filter(r => {
    if (filters.brand && r.brand !== filters.brand) return false;
    if (filters.category && r.category !== filters.category) return false;
    if (filters.status && r.status !== filters.status) return false;
    if (filters.owner && r.owner !== filters.owner) return false;
    if (filters.search && !(r.seller_name||'').toLowerCase().includes(filters.search.toLowerCase())) return false;
    return true;
  });

function renderRankList(elId, countMap, isWon, emptyLabel){
  const el = document.getElementById(elId);

  const max = Math.max(...keys.map(k=>countMap[k]));
  el.innerHTML = keys.map(k => `<div class="rank-row"><span class="rname">${esc(k)}</span><span class="rbar-track"><span class="rbar-fill" style="width:${max?(countMap[k]/max*100):0}%"></span></span><span class="rval">${isWon?fmtWon(countMap[k]):countMap[k]+'건'}</span></div>`).join('');
}
  function renderRunnerRank(elId, pool, countMap, isWon){ const el = document.getElementById(elId); const keys = Object.keys(countMap).sort((a,b)=>countMap[b]-countMap[a]); if (!keys.length){ el.innerHTML = `<div class="empty-state" style="padding:20px 0;">데이터 없음</div>`; return; } const max = Math.max(...keys.map(k=>countMap[k])); el.innerHTML = keys.map(k => { const p = pool.find(x=>x.seller_name===k); return `<div class="rank-row"><span class="rname">${esc(k)}</span>${p?brandBadge(p.brand):''}<span class="rbar-track"><span class="rbar-fill" style="width:${max?(countMap[k]/max*100):0}%;"></span></span><span class="rval">${isWon?fmtWon(countMap[k]):countMap[k]+'건'}</span></div>`; }).join(''); }

function renderKPI(){
  document.getElementById('btn-add').style.display = 'none';
  const rows = applyFilters(SELLERS);
  document.getElementById('f-count').textContent = `${rows.length} / ${SELLERS.length}건 기준 집계`;
  const owners = uniqueSorted(rows.map(r=>r.owner));
  const stats = owners.map(o => {
    const mine = rows.filter(r=>r.owner===o);
    const contacted = mine.length;
    const responded = mine.filter(r=>r.status!=='콜드').length;
    const confirmed = mine.filter(r=>r.status==='확정').length;
    const sales = mine.filter(r=>r.status==='확정').reduce((s,r)=>s+(r.actual_sales||0),0);
    return { owner:o, contacted, responded, confirmed, respRate: contacted?responded/contacted:0, cvr: contacted?confirmed/contacted:0, sales };
  }).sort((a,b)=>b.contacted-a.contacted);
  const totalContacted = stats.reduce((s,x)=>s+x.contacted,0);
  const totalResponded = stats.reduce((s,x)=>s+x.responded,0);
  const totalConfirmed = stats.reduce((s,x)=>s+x.confirmed,0);
  const totalSales = stats.reduce((s,x)=>s+x.sales,0);

    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);">

      <div class="kpi-card"><div class="klabel">확정 수</div><div class="kval green">${totalConfirmed}</div></div>
      <div class="kpi-card"><div class="klabel">확정 매출 합계</div><div class="kval" style="font-size:18px;">${fmtWon(totalSales)}</div></div>
    </div>

      <table class="kpi"><thead><tr><th>담당자</th><th>접촉 수</th><th>응답 이상 수</th><th>응답률</th><th>확정 수</th><th>확정 전환율</th><th>확정 매출 합계</th></tr></thead>

        </tbody>

function dateFromYMD(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function localYMD(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function daysBetween(a,b){ return Math.round((b.getTime()-a.getTime())/86400000); }

function pickDefaultMonth(events){
  const today = new Date();
  const thisMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const nextMonthStart = new Date(today.getFullYear(), today.getMonth()+1, 1);
  const hasThisMonth = events.some(e => dateFromYMD(e.start_date) < nextMonthStart && dateFromYMD(e.end_date) > thisMonthStart);
  if (hasThisMonth || !events.length) return thisMonthStart;
  const future = events.filter(e => dateFromYMD(e.start_date) >= thisMonthStart);
  const pick = future.length ? future[0] : events[0];
  const d = dateFromYMD(pick.start_date);
  return new Date(d.getFullYear(), d.getMonth(), 1);
}
function layoutWeek(weekStart, events){
  const weekEndEx = new Date(weekStart); weekEndEx.setDate(weekEndEx.getDate()+7);
  const items = events.map((e,idx) => ({ e, idx, s: dateFromYMD(e.start_date), en: dateFromYMD(e.end_date) }))
    .filter(x => x.s < weekEndEx && x.en > weekStart)
    .map(x => { const colStart = Math.max(0, daysBetween(weekStart, x.s)); const colEndEx = Math.min(7, daysBetween(weekStart, x.en));
      return { ...x, colStart, colEnd: colEndEx-1, roundL: x.s >= weekStart, roundR: x.en <= weekEndEx }; })
    .sort((a,b) => a.colStart-b.colStart || (b.colEnd-b.colStart)-(a.colEnd-a.colStart));
  const laneEnds = [];
  items.forEach(it => { let lane = laneEnds.findIndex(end => end < it.colStart); if (lane===-1){ lane = laneEnds.length; laneEnds.push(it.colEnd); } else laneEnds[lane]=it.colEnd; it.lane = lane; });
  return { items, laneCount: laneEnds.length };
}

function paintCalendar(){
  closeCalPopover();
  const el = document.getElementById('content');
  const year = calMonthCursor.getFullYear(), month = calMonthCursor.getMonth();
  const todayStr = localYMD(new Date());
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = firstOfMonth.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const totalCells = Math.ceil((startOffset+daysInMonth)/7)*7;
  const numWeeks = totalCells/7;
  const firstCellDate = new Date(year, month, 1-startOffset);
  const dow = ['일','월','화','수','목','금','토'];
  const BAR_H=21, BAR_GAP=3, HEADER_H=24;
  let weeksHtml = '';
  for (let w=0; w<numWeeks; w++){
    const weekStart = new Date(firstCellDate); weekStart.setDate(firstCellDate.getDate()+w*7);
    const dayDates = []; for (let d=0; d<7; d++){ const cd = new Date(weekStart); cd.setDate(weekStart.getDate()+d); dayDates.push(cd); }
    const { items, laneCount } = layoutWeek(weekStart, CAL_EVENTS);
    const weekMinHeight = HEADER_H + Math.max(laneCount,1)*(BAR_H+BAR_GAP) + 6;
    const daysHtml = dayDates.map(cd => { const inMonth = cd.getMonth()===month; const ymd = localYMD(cd);
      return `<div class="cal-daycell ${inMonth?'':'other-month'}" style="min-height:${weekMinHeight}px;"><span class="cal-daynum ${ymd===todayStr?'is-today':''}">${cd.getDate()}</span></div>`; }).join('');
    const barsHtml = items.map(it => { const leftPct=(it.colStart/7*100); const widthPct=((it.colEnd-it.colStart+1)/7*100); const top=it.lane*(BAR_H+BAR_GAP);
      const cls=[it.roundL?'round-l':'', it.roundR?'round-r':''].join(' ');
      return `<div class="cal-bar ${cls}" style="left:${leftPct}%;width:${widthPct}%;top:${top}px;" data-idx="${it.idx}" title="${esc(it.e.title)}">${esc(it.e.title)}</div>`; }).join('');
    weeksHtml += `<div class="cal-week"><div class="cal-week-days">${daysHtml}</div><div class="cal-week-bars">${barsHtml}</div></div>`;
  }
  el.innerHTML = `
    <div class="cal-toolbar">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">‹</button><span class="cal-month-label">${year}년 ${month+1}월</span>
        <button class="cal-nav-btn" id="cal-next">›</button><button class="cal-today-btn" id="cal-today">오늘</button>
      </div>
      <div class="cal-legend"><span class="cal-legend-dot"></span> 공동구매 캘린더 · 클릭하면 상세정보가 보여요</div>
    </div>
    <div class="cal-grid-wrap"><div class="cal-dow">${dow.map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-weeks">${weeksHtml}</div></div>
    ${!CAL_EVENTS.length?'<div class="cal-note">등록된 일정이 없어요. 상단 \'＋ 신규 등록\'으로 추가해보세요.</div>':''}
  `;
  document.getElementById('cal-prev').addEventListener('click', () => { calMonthCursor = new Date(year, month-1, 1); paintCalendar(); });
  document.getElementById('cal-next').addEventListener('click', () => { calMonthCursor = new Date(year, month+1, 1); paintCalendar(); });
  document.getElementById('cal-today').addEventListener('click', () => { const t = new Date(); calMonthCursor = new Date(t.getFullYear(), t.getMonth(), 1); paintCalendar(); });
  el.querySelectorAll('.cal-bar').forEach(bar => bar.addEventListener('click', () => { const ev = CAL_EVENTS[parseInt(bar.dataset.idx)]; if (ev) showEventPopover(ev, bar.getBoundingClientRect()); }));
}

const RAW_TABLES = {
  sellers: { label:'셀러 (sellers)', cols:['id','seller_name','brand','category','contactor','owner','contact_date','status','followers','expected_week','actual_sales','note','followup'] },
  campaigns: { label:'캠페인 (campaigns)', cols:['id','title','owner','target_view','reach_view','achievement_rate','total_sales','upload_avg_sales','non_upload_avg_sales','upload_effect','imc_cost'] },
  campaign_collaborators: { label:'협업자 (campaign_collaborators)', cols:['id','campaign_id','channel','handle','category','product','content_type','collab_type','upload_date','views','link','auto_dm','status','comment','note'] },
  market_calendar_events: { label:'캘린더 (market_calendar_events)', cols:['id','title','start_date','end_date','description','source_link'] },
};
function rawRows(){
  if (rawTable === 'sellers') return SELLERS;
  if (rawTable === 'campaigns') return CAMPAIGNS.map(({campaign_collaborators, ...rest}) => rest);
  if (rawTable === 'campaign_collaborators') return CAMPAIGNS.flatMap(c => c.campaign_collaborators||[]);
  if (rawTable === 'market_calendar_events') return CAL_EVENTS;
  return [];
}
function renderRaw(){
  document.getElementById('btn-add').style.display = 'none';
  document.getElementById('f-count').textContent = '';
  const rows = rawRows();
  const cols = RAW_TABLES[rawTable].cols;
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="raw-tabs">${Object.keys(RAW_TABLES).map(k => `<div class="raw-tab ${k===rawTable?'active':''}" data-t="${k}">${RAW_TABLES[k].label} (${k==='sellers'?SELLERS.length:k==='campaigns'?CAMPAIGNS.length:k==='campaign_collaborators'?CAMPAIGNS.flatMap(c=>c.campaign_collaborators||[]).length:CAL_EVENTS.length})</div>`).join('')}</div>
    <div class="raw-scroll">
      <table class="raw"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows.length ? rows.map(r => `<tr>${cols.map(c => `<td title="${esc(r[c])}">${r[c]==null?'':esc(r[c])}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text-dim);padding:24px;">데이터 없음</td></tr>`}</tbody>
      </table>
    </div>`;
  el.querySelectorAll('.raw-tab').forEach(t => t.addEventListener('click', () => { rawTable = t.dataset.t; renderRaw(); })); wirePager('content','raw-'+rawTable, rows.length);
}

function switchView(v){ ensureContentShellReset();
  if (!VIEWS[v]) return;
  currentView = v;
  document.querySelectorAll('.nav-item[data-view]').forEach(n => n.classList.toggle('active', n.dataset.view===v));
  document.getElementById('page-title').textContent = VIEWS[v].title;
  document.getElementById('page-sub').textContent = VIEWS[v].sub;
  document.getElementById('filterbar').style.display = VIEWS[v].showFilterbar ? 'flex' : 'none';
  VIEWS[v].render();
}
function wireFilters(){
  document.getElementById('f-brand').addEventListener('change', e => { filters.brand=e.target.value; VIEWS[currentView].render(); });
  document.getElementById('f-category').addEventListener('change', e => { filters.category=e.target.value; VIEWS[currentView].render(); });
  document.getElementById('f-status').addEventListener('change', e => { filters.status=e.target.value; VIEWS[currentView].render(); });
  document.getElementById('f-owner').addEventListener('change', e => { filters.owner=e.target.value; VIEWS[currentView].render(); });
  document.getElementById('f-search').addEventListener('input', e => { filters.search=e.target.value; VIEWS[currentView].render(); });
  document.getElementById('f-reset').addEventListener('click', () => { filters={brand:'',category:'',status:'',owner:'',search:''}; document.getElementById('f-search').value=''; populateFilterOptions(); VIEWS[currentView].render(); });
  document.getElementById('btn-refresh').addEventListener('click', loadAll);
}

function wireMobileNav(){const sidebar=document.getElementById('sidebar');const backdrop=document.getElementById('sidebar-backdrop');const btn=document.getElementById('btn-hamburger');if(!btn||!sidebar||!backdrop)return;btn.addEventListener('click',()=>{sidebar.classList.add('open');backdrop.classList.add('show');});backdrop.addEventListener('click',()=>{sidebar.classList.remove('open');backdrop.classList.remove('show');});}window.initApp = function(){wireMobileNav();
  renderNav();
  document.querySelector('.nav-item[data-view="overview"]').classList.add('active');
  wireFilters();
  loadAll();
};
